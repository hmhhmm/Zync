version: "3.9"

services:
  # ── Neo4j — Knowledge Graph (Agent 1) ──────────────────────────────────────
  neo4j:
    image: neo4j:5.18
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/zync1234
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "zync1234", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgreSQL — Iteration Table (Agent 3) ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER:     zync
      POSTGRES_PASSWORD: zync1234
      POSTGRES_DB:       zync
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zync"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Qdrant — Vector + Hybrid Search (Agent 4) ───────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.2
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: zync1234
      POSTGRES_URL: postgresql://zync:zync1234@postgres:5432/zync
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
    volumes:
      - ./backend:/app
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy

volumes:
  neo4j_data:
  postgres_data:
  qdrant_data: